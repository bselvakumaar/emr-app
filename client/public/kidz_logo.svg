<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="dropshadow" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge> 
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/> 
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle (Soft White/Blue) -->
  <circle cx="200" cy="200" r="190" fill="#f0fdf9" stroke="#34d399" stroke-width="8"/>
  
  <!-- Medical Cross with Rounded Edges -->
  <g filter="url(#dropshadow)">
    <rect x="160" y="80" width="80" height="240" rx="40" fill="url(#mainGrad)"/>
    <rect x="80" y="160" width="240" height="80" rx="40" fill="url(#mainGrad)"/>
  </g>
  
  <!-- Child Element (Subtle Heart) -->
  <path d="M200 210 q-30-40 -50-20 t 50 60 q 30-80 50-60 t -50 20" fill="white" stroke="white" stroke-width="5" transform="translate(0, -10)"/>

  <!-- Text -->
  <text x="50%" y="320" dominant-baseline="middle" text-anchor="middle" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="0" font-weight="bold" fill="#064e3b">KIDZ CLINIC</text>
</svg>
