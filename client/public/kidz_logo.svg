<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Icon: Smiling Heart with Stethoscope -->
  <g transform="translate(20, 10) scale(0.8)">
    <path d="M50 85 C20 55 5 40 5 25 A20 20 0 0 1 45 15 A20 20 0 0 1 85 15 A20 20 0 0 1 95 25 C95 40 80 55 50 85 Z" fill="#f43f5e" filter="url(#shadow)"/>
    <!-- Band-aid -->
    <rect x="30" y="30" width="40" height="10" rx="5" fill="#fcd34d" transform="rotate(-15 50 35)"/>
    <circle cx="45" cy="35" r="1.5" fill="#ca8a04"/>
    <circle cx="55" cy="38" r="1.5" fill="#ca8a04"/>
    <!-- Stethoscope part -->
    <path d="M50 85 Q 50 100 70 100 T 90 90" fill="none" stroke="#374151" stroke-width="4" stroke-linecap="round"/>
    <circle cx="90" cy="90" r="6" fill="#9ca3af"/>
  </g>
  
  <!-- Text -->
  <text x="110" y="65" font-family="'Comic Sans MS', 'Chalkboard SE', sans-serif" font-size="48" font-weight="bold" fill="url(#grad1)" filter="url(#shadow)">Kidz Clinic</text>
  <text x="115" y="85" font-family="sans-serif" font-size="14" fill="#6b7280" letter-spacing="2">CHILDREN'S HOSPITAL</text>
</svg>
