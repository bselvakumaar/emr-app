# =====================================================
# Netlify Configuration for EMR Application
# =====================================================

[build]
  # Build the React frontend
  command   = "npm run build"
  publish   = "client/dist"
  # Netlify Functions directory (contains our Express wrapper)
  functions = "server"

[build.environment]
  NODE_VERSION = "20"

# =====================================================
# Redirect all /api/* requests to the serverless function
# =====================================================
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/lambda/:splat"
  status = 200
  force  = true

# =====================================================
# SPA fallback – serve index.html for all other routes
# =====================================================
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
